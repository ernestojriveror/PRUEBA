<!DOCTYPE html>
<html>

<head>
    <title>Login de Usuario</title>
</head>

<body>
    <input id="email" type="email" placeholder="xxxx@email.com">
    <input id="password" tipe="password" placeholder="senha">
    <button onclick="enter()">Enter</button>
    <div id="mensagem"></div>

    <Script>
        function enter() {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const mensagem = document.getElementById("mensagem");

            const emailCorrecto = "ernestojriveror@gmail.com"
            const passwordCorrecto = "12345678"
            


            if (email === emailCorrecto && password === passwordCorrecto) {
                mensagem.textContent = " Login correcto";

            } else {
                mensagem.textContent = " Email o contraseña incorrectos";

            }
        }

    </Script>
</body>

</html>
